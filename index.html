<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cut Optimizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Cut Optimizer</h1>
        <p>Minimize waste when cutting lumber and sheet goods.</p>
      </header>

      <section class="card">
        <h2>Settings</h2>
        <label>
          Blade kerf (inches):
          <input id="kerf" type="number" step="0.0625" min="0" max="1" value="0.125" />
        </label>
      </section>

      <section class="card">
        <h2>Stock</h2>
        <div class="input-row">
          <input id="stock-label" type="text" placeholder="Label (e.g. 4x8 Plywood)" />
          <input id="stock-width" type="number" placeholder="Width" min="0" step="0.125" />
          <input id="stock-length" type="number" placeholder="Length" min="0" step="0.125" />
          <select id="stock-unit">
            <option value="in" selected>inches</option>
            <option value="ft">feet</option>
          </select>
          <input id="stock-qty" type="number" placeholder="Qty" min="1" value="1" class="qty" />
          <button id="add-stock">Add</button>
        </div>
        <table id="stock-table">
          <thead><tr><th>Label</th><th>Width</th><th>Length</th><th>Qty</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <section class="card">
        <h2>Desired Cuts</h2>
        <div class="input-row">
          <input id="cut-label" type="text" placeholder="Label (e.g. Shelf)" />
          <input id="cut-width" type="number" placeholder="Width" min="0" step="0.125" />
          <input id="cut-length" type="number" placeholder="Length" min="0" step="0.125" />
          <select id="cut-unit">
            <option value="in" selected>inches</option>
            <option value="ft">feet</option>
          </select>
          <input id="cut-qty" type="number" placeholder="Qty" min="1" value="1" class="qty" />
          <button id="add-cut">Add</button>
        </div>
        <table id="cut-table">
          <thead><tr><th>Label</th><th>Width</th><th>Length</th><th>Qty</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
      </section>

      <div class="optimize-row">
        <button id="optimize-btn" class="primary">Optimize Cuts</button>
      </div>

      <section id="results">
        <p class="hint">Add stock and cuts above, then click Optimize.</p>
      </section>

      <footer class="app-footer">
        <a id="report-issue"
           href="https://github.com/eric-d-ferguson/cut-optimizer/issues"
           target="_blank" rel="noopener">Found a bug or have an idea? Report an issue ↗</a>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
